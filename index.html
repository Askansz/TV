<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TV Photo Display</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:black;
    overflow:hidden;
    font-family:sans-serif;
}

#display-container{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

#display-image{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 2s;
}

#display-image.show{
    opacity:1;
}

#clock{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    text-align:right;
    z-index:10;
}

#time{
    font-size:42px;
}

#date{
    font-size:18px;
}

.dvd{
    position:absolute;
    width:180px;
    height:90px;
    background:red;
}
</style>
</head>

<body>

<div id="clock">
<div id="time">00:00:00</div>
<div id="date"></div>
</div>

<div id="display-container">
<img id="display-image">
</div>

<script>

/* ---------------- CONFIG ---------------- */

var config = {
    mode:1,
    images:[]
};

var imageIndex = 0;
var slideshowTimer = null;

/* ---------------- CLOCK ---------------- */

function updateClock(){

    var now = new Date();

    var h = now.getHours();
    var m = now.getMinutes();
    var s = now.getSeconds();

    if(h<10)h="0"+h;
    if(m<10)m="0"+m;
    if(s<10)s="0"+s;

    document.getElementById("time").innerHTML = h+":"+m+":"+s;

    var d = now.toDateString();
    document.getElementById("date").innerHTML = d;
}

setInterval(updateClock,1000);
updateClock();

/* ---------------- CONFIG LOADER ---------------- */

function loadConfig(){

    var xhr = new XMLHttpRequest();

    xhr.open("GET","config.json?t="+new Date().getTime(),true);

    xhr.onreadystatechange=function(){

        if(xhr.readyState===4){

            if(xhr.status===200){

                try{

                    var data = JSON.parse(xhr.responseText);

                    if(data.images){
                        config.images = data.images;
                    }

                    if(data.mode){
                        config.mode = data.mode;
                    }

                }catch(e){}
            }

        }

    };

    xhr.send();
}

setInterval(loadConfig,300000);
loadConfig();

/* ---------------- SLIDESHOW ---------------- */

var img = document.getElementById("display-image");

function nextImage(){

    if(config.images.length===0){
        return;
    }

    imageIndex++;

    if(imageIndex>=config.images.length){
        imageIndex=0;
    }

    var url = config.images[imageIndex];

    var preload = new Image();

    preload.onload=function(){

        img.className="";
        img.src=url;

        setTimeout(function(){
            img.className="show";
        },50);

    };

    preload.src=url;
}

function startSlideshow(){

    if(slideshowTimer){
        clearInterval(slideshowTimer);
    }

    nextImage();

    slideshowTimer = setInterval(nextImage,10000);
}

/* ---------------- DVD MODE ---------------- */

var dvd = null;
var dvdX = 100;
var dvdY = 100;
var dx = 3;
var dy = 3;

function startDVD(){

    var container = document.getElementById("display-container");

    container.innerHTML="";

    dvd = document.createElement("div");
    dvd.className="dvd";

    container.appendChild(dvd);

    setInterval(function(){

        var w = window.innerWidth-180;
        var h = window.innerHeight-90;

        dvdX+=dx;
        dvdY+=dy;

        if(dvdX<=0 || dvdX>=w){
            dx=-dx;
        }

        if(dvdY<=0 || dvdY>=h){
            dy=-dy;
        }

        dvd.style.left=dvdX+"px";
        dvd.style.top=dvdY+"px";

    },20);
}

/* ---------------- START ---------------- */

function start(){

    if(config.mode===4){
        startDVD();
    }else{
        startSlideshow();
    }

}

setTimeout(start,1000);

</script>

</body>
</html>
